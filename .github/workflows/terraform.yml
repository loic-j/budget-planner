name: Terraform

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Terraform action'
        required: true
        default: 'plan'
        type: choice
        options:
          - plan
          - apply

jobs:
  terraform:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_TF_SA }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: infra/terraform
        run: terraform init

      - name: Terraform Plan
        working-directory: infra/terraform
        run: terraform plan
        env:
          TF_VAR_github_owner: ${{ vars.TF_VAR_github_owner }}
          TF_VAR_github_repo: ${{ vars.TF_VAR_github_repo }}
          TF_VAR_project_id: ${{ vars.TF_VAR_project_id }}
          TF_VAR_region: ${{ vars.TF_VAR_region }}
          TF_VAR_service_name: ${{ vars.TF_VAR_service_name }}
          TF_VAR_app_url: ${{ vars.TF_VAR_app_url }}

      - name: Terraform Apply
        if: inputs.action == 'apply'
        working-directory: infra/terraform
        run: terraform apply -auto-approve
        env:
          TF_VAR_github_owner: ${{ vars.TF_VAR_github_owner }}
          TF_VAR_github_repo: ${{ vars.TF_VAR_github_repo }}
          TF_VAR_project_id: ${{ vars.TF_VAR_project_id }}
          TF_VAR_region: ${{ vars.TF_VAR_region }}
          TF_VAR_service_name: ${{ vars.TF_VAR_service_name }}
          TF_VAR_app_url: ${{ vars.TF_VAR_app_url }}
